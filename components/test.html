function HoverSection(SectionSelector) {
  jQuery(SectionSelector).hover(
    function() {
      jQuery(SectionSelector).addClass("hover");
    },
    function() {
      jQuery(SectionSelector).removeClass("hover");
    }
  );
}

function SelectSection(SectionSelector) {
  jQuery(SectionSelector).click(function() {
    if (jQuery(SectionSelector).hasClass("selected")) {
      jQuery(SectionSelector).removeClass("selected");
      jQuery(SectionSelector).css("opacity", 1);
    } else {
      jQuery(SectionSelector).addClass("selected");
      jQuery(SectionSelector).css("opacity", opacityValue);
    }

    if (selectedArea.indexOf(jQuery(SectionSelector).attr("data-section")) == -1) {
      selectedArea.push(jQuery(SectionSelector).attr("data-section"));
    } else {
      selectedArea = selectedArea.filter(
        item => item != jQuery(SectionSelector).attr("data-section")
      );
    }

    //console.log(selectedArea);
    //jQuery(SectionSelector).toggleClass("selected");
  });
}

function ageDropdown() {
  document.getElementById("myDropdown").classList.toggle("show");

window.onclick = function(event) {
  if (!event.target.matches(".dropbtn")) {
    var dropdowns = document.getElementsByClassName("dropdown-content");
    var i;
    for (i = 0; i < dropdowns.length; i++) {
      var openDropdown = dropdowns[i];
      if (openDropdown.classList.contains("show")) {
        openDropdown.classList.remove("show");
      }
    }
  }
};

    value.each(function() {
